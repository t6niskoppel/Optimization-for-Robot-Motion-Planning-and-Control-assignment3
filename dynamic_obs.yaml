world:
  height: 42
  width: 42
  step_time: 0.1
  sample_time: 0.1
  offset: [5, 5]
  collision_mode: 'stop'
  control_mode: 'auto' 

robot:
  - kinematics: {name: 'diff'} 
    shape: {name: 'circle', radius: 0.2}  
    state: [10, 20, 0]  # x, y, theta (radians)
    goal: [28, 20, 0]   # x, y, theta (radians)
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.3
    plot:
      show_trail: True
      show_goal: True

    sensors: 
      - type: 'lidar2d'
        range_min: 0
        range_max: 5
        angle_range: 6.2831852
        number: 200
        noise: False
        alpha: 0.3

obstacle:
  - number: 7
    distribution: {name: 'random', range_low: [10, 10, -3.14], range_high: [40, 40, 3.14]}
    kinematics: {name: 'diff'}
    shape:
      - {name: 'circle', radius: 0.75}  # radius

    behavior: 
      - {name: 'dash', range_low: [10, 10, -3.14], range_high: [40, 40, 3.14], wander: True}
    vel_min: [-1.0, -3.14]
    vel_max: [1.0, 3.14]
    arrive_mode: position
    goal_threshold: 0.3
    plot:
      show_goal: False
      show_arrow: True
      show_trail: False