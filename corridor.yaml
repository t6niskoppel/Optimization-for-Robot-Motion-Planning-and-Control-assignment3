world:
  height: 20
  width: 63
  step_time: 0.1
  sample_time: 0.1
  offset: [0, 10]
  collision_mode: 'stop'  
  control_mode: 'auto'

robot:
  - kinematics: {name: 'diff'} 
    shape: {name: 'circle', radius: 0.2}  
    state: [0, 20, 0]  # x, y, theta (radians)
    goal: [55, 20, 0]   # x, y, theta (radians)
    vel_min: [-2, -2]
    vel_max: [2, 2]
    goal_threshold: 0.3
    plot:
      show_trail: True
      show_goal: True

    sensors: 
      - type: 'lidar2d'
        range_min: 0
        range_max: 10
        angle_range: 6.2831852
        number: 200
        noise: False
        alpha: 0.3

obstacle:
  - number: 6
    distribution: {name: 'manual'}
    shape:
      - {name: 'rectangle', length: 70, width: 2} 
      - {name: 'rectangle', length: 70, width: 2}
      - {name: 'rectangle', length: 5, width: 2}
      - {name: 'rectangle', length: 5, width: 2}
      - {name: 'rectangle', length: 6, width: 2}
      - {name: 'rectangle', length: 5, width: 2}

    state: [[30, 25, 0], [30, 15, 0], [10, 18.5, 1.57], [23, 21.5, 1.57], [36, 17, 2.1], [50, 22, 4.3] ]
